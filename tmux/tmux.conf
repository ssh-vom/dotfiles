# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# True color / terminal support
# tmux-256color is correct inside tmux; advertise RGB for common outer terminals.
set -g default-terminal "tmux-256color"
set -g terminal-features "tmux-256color:RGB,xterm-256color:RGB,alacritty:RGB,kitty:RGB,wezterm:RGB"

# Better key handling in modern terminals
set -g extended-keys on
set -g extended-keys-format csi-u

# Name the current tmux window from the active pane's current directory.
# Example: ~/projects/my-app -> my-app
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Reload config
# bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# AI popup: persistent pi session per repo, reattached through a popup.
bind -r y display-popup -d '#{pane_current_path}' -w80% -h80% -E "$HOME/.local/bin/tmux-ai-popup"

# Terminal popup: persistent generic shell session per repo/current directory.
bind -r t display-popup -d '#{pane_current_path}' -w80% -h80% -E "$HOME/.local/bin/tmux-terminal-popup"

# Diff review popup: open comview for the current repo diff.
# If invoked with a file path, the helper limits the diff to that file; tmux only
# exposes pane_current_path as a directory, so this binding uses the repo diff.
bind -r v display-popup -d '#{pane_current_path}' -w90% -h90% -E "$HOME/.local/bin/tmux-comview-popup '#{pane_current_path}'"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE — Tokyo Night
# ============================================
# Palette: bg #1a1b26 · dim #565f89 · fg #c0caf5 · blue #7aa2f7 · cyan #7dcfff

# Status bar (bottom): keep the window list visible without fighting the pane line.
set -g status on
set -g status-position bottom
set -g status-interval 15
set -g status-justify left
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left-length 100
set -g status-right-length 200

# Left: intentionally empty; window list stays minimal on the bottom bar.
set -g status-left ""

# Windows: dim inactive, blue pill for active
set -g window-status-separator ""
setw -g window-status-format "#[fg=#565f89]  #I #[fg=#a9b1d6]#W  "
setw -g window-status-current-format "#[fg=#7aa2f7]#[bg=#7aa2f7,fg=#1a1b26,bold] #I #W #[bg=default,fg=#7aa2f7]"

# Right: session and clock
set -g status-right "#[fg=#7aa2f7]#[bg=#7aa2f7,fg=#1a1b26,bold]  #S #[bg=default,fg=#7aa2f7]  #[fg=#565f89]%H:%M %a %d"

# Borders, messages, copy-mode
# tmux borders are 1-cell wide, so make them easier to spot with contrast
# and a visible pane title line.
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#7dcfff"
set -g pane-border-status top
set -g pane-border-format "#[fg=#7aa2f7,bold] #T #[fg=#565f89]─#[default]"
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#7dcfff,fg=#1a1b26,bold"
setw -g mode-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g display-panes-active-colour "#7aa2f7"
set -g display-panes-colour "#565f89"
set -g clock-mode-colour "#7aa2f7"

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
set -g @plugin 'craftzdog/tmux-claude-session-manager'

